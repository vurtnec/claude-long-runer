# Scheduler Global Configuration
# ================================
# Copy this file to scheduler_config.yaml and configure your settings.

daemon:
  poll_interval_seconds: 30       # How often to check triggers
  schedules_dir: "schedules"      # Directory containing schedule YAML files

# Notification service credentials
notifications:
  wechat:
    # ServerChan: https://sct.ftqq.com/
    # Free tier: 5 messages/day pushed to WeChat
    serverchan_key: "{{env.SERVERCHAN_KEY}}"

    # WxPusher: https://wxpusher.zjiecode.com/
    # Completely free, unlimited pushes
    wxpusher_token: "{{env.WXPUSHER_TOKEN}}"
    wxpusher_uid: "{{env.WXPUSHER_UID}}"

  feishu:
    # Feishu custom bot webhook (for scheduled task push notifications, one-way)
    webhook_url: "{{env.FEISHU_WEBHOOK_URL}}"
    # Feishu app bot (for receiving group messages and triggering tasks, two-way)
    # Create an enterprise app at open.feishu.cn and enable bot capabilities
    app_id: "{{env.FEISHU_APP_ID}}"
    app_secret: "{{env.FEISHU_APP_SECRET}}"

  dingtalk:
    # DingTalk custom bot: Group Settings > Smart Group Assistant > Add Bot > Custom
    # For security settings, choose "Custom Keywords" and enter "notification"
    webhook_url: "{{env.DINGTALK_WEBHOOK_URL}}"

  email:
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    smtp_user: "{{env.SMTP_USER}}"
    smtp_password: "{{env.SMTP_PASSWORD}}"
    from_address: "scheduler@example.com"
    use_tls: true

# Execution history
history:
  max_entries: 1000
  history_file: "scheduler_history.json"

# Default values for all scheduled tasks (overridable per schedule)
defaults:
  model: "claude-opus-4-7"
  effort: "xhigh"                   # Thinking depth: low, medium, high, xhigh, max (omit to use CLI default)
  max_iterations: 10
  timeout_minutes: 120

# Feishu bot settings (for receiving messages and triggering tasks)
feishu_bot:
  enabled: true                     # Start bot alongside daemon
  model: "claude-opus-4-7"
  effort: "xhigh"                   # Default effort for bot sessions (omit to use CLI default)
  max_turns: 10
  # allowed_user_ids: []            # Empty = allow all; add open_ids to restrict

  # Project list: alias -> config. Use /project <alias> to switch.
  # Two formats are supported:
  #   Plain string (legacy): alias: "/path/to/project"
  #   Dict (new format):
  #     alias:
  #       path: "/path/to/project"
  #       restricted: true           # Restrict bash commands to paths within the project directory
  #       model: "claude-sonnet-4-5-20250929"  # Default model for this project (inherits global if unset)
  projects:
    my-project:
      path: "/path/to/your/project"
      restricted: true               # Enable directory restriction
      model: "claude-sonnet-4-5-20250929"
      effort: "high"                 # Per-project effort level
    another: "/path/to/another/project"   # Legacy format, no restriction, inherits global model
  default_project: "my-project"     # Default project alias
