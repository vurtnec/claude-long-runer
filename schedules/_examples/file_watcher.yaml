# Example: File change trigger
# =============================
# Automatically re-runs analysis when data files are updated.
# To use, copy this file to the schedules/ directory and modify the configuration.

name: data_refresh
description: "Automatically re-analyze when data files are updated"
enabled: true

trigger:
  type: file_changed
  paths:
    - "/data/exports/daily_export.csv"
    - "/data/exports/weekly_export.csv"
  debounce_seconds: 60            # Wait 60 seconds after file change before triggering (to avoid rapid re-triggers)

task:
  name: data_analysis
  params:
    source_file: "{{trigger.changed_file}}"
  project_dir: "/path/to/project"
  model: "claude-sonnet-4-5-20250929"
  max_iterations: 5

notifications:
  on_success:
    - type: wechat
      channel: serverchan
      title: "Data Analysis Updated"
      body: |
        File {{trigger.changed_file}} has been updated; analysis complete.
        Duration: {{duration}}

  on_failure:
    - type: wechat
      channel: serverchan
      title: "Data Analysis Failed"
      body: "Analysis failed after file {{trigger.changed_file}} was updated: {{error}}"
