# 示例：文件变更触发
# ==================
# 当数据文件更新后，自动重新运行分析任务。
# 使用前请将此文件复制到 schedules/ 目录并修改配置。

name: data_refresh
description: "数据文件更新后自动重新分析"
enabled: true

trigger:
  type: file_changed
  paths:
    - "/data/exports/daily_export.csv"
    - "/data/exports/weekly_export.csv"
  debounce_seconds: 60            # 文件变更后等待60秒再触发（避免频繁触发）

task:
  name: data_analysis
  params:
    source_file: "{{trigger.changed_file}}"
  project_dir: "/path/to/project"
  model: "claude-sonnet-4-5-20250929"
  max_iterations: 5

notifications:
  on_success:
    - type: wechat
      channel: serverchan
      title: "数据分析更新"
      body: |
        文件 {{trigger.changed_file}} 已更新，分析完成。
        耗时: {{duration}}

  on_failure:
    - type: wechat
      channel: serverchan
      title: "数据分析失败"
      body: "文件 {{trigger.changed_file}} 更新后分析失败: {{error}}"
