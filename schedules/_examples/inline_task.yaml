# Example: Inline prompt task (no task directory needed)
# =======================================================
# Write the prompt directly in YAML — ideal for lightweight scheduled tasks.
# To use, copy this file to the schedules/ directory and modify the configuration.

name: morning_briefing
description: "Generate a morning briefing every weekday at 7:30 AM"
enabled: true

trigger:
  type: cron
  cron: "30 7 * * 1-5" # Weekdays at 7:30 AM
  timezone: "Asia/Shanghai"

task:
  type: inline
  prompt: |
    Please summarize the following information:
    1. Today is {{today}}
    2. Analyze key market outlook highlights for today
    3. Summarize recent tech news highlights
    Please keep it concise.
  model: "claude-opus-4-7"
  max_turns: 3
  project_dir: "."

notifications:
  on_success:
    - type: wechat
      channel: serverchan
      title: "Morning Briefing - {{today}}"
      body: "{{last_response}}"
