# Example: Daily scheduled analysis task + WeChat push notification
# ==================================================================
# Automatically runs an analysis task every day at 8 AM, then pushes the result to WeChat.
# To use, copy this file to the schedules/ directory and modify the configuration.

name: daily_analysis
description: "Run data analysis every day at 8 AM"
enabled: true

trigger:
  type: cron
  cron: "0 8 * * *"              # Every day at 8:00 AM
  timezone: "Asia/Shanghai"

task:
  name: data_analysis             # Corresponds to the tasks/data_analysis/ directory
  params:
    report_type: "daily"
    date: "{{today}}"
  project_dir: "/path/to/your/project"
  model: "claude-sonnet-4-5-20250929"
  max_iterations: 10

timeout_minutes: 90

notifications:
  on_success:
    - type: wechat
      channel: serverchan
      title: "Analysis Complete - {{date}}"
      body: |
        Task: {{task_name}}
        Duration: {{duration}}
        Iterations: {{iterations}}

        Result summary:
        {{last_response}}

  on_failure:
    - type: wechat
      channel: serverchan
      title: "Task Failed: {{task_name}}"
      body: "Task failed after {{iterations}} iterations. Error: {{error}}"

retry:
  max_retries: 1
  retry_delay_minutes: 5
