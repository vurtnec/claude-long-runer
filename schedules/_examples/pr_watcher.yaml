# Example: PR monitoring (composite trigger)
# =============================================
# Checks for new PRs every 30 minutes during work hours; auto-reviews if found.
# To use, copy this file to the schedules/ directory and modify the configuration.

name: pr_review_auto
description: "Check for new PRs every 30 minutes during work hours and auto-review"
enabled: true

trigger:
  type: composite
  operator: and
  triggers:
    - type: cron
      cron: "*/30 9-18 * * 1-5"  # Weekdays 9:00-18:00, every 30 minutes
    - type: http_condition
      url: "https://api.github.com/repos/OWNER/REPO/pulls?state=open"
      headers:
        Authorization: "token {{env.GITHUB_TOKEN}}"
      condition:
        jq_expression: "length > 0"

task:
  name: pr_review
  params:
    pr_number: "{{trigger.http_response[0].number}}"
  project_dir: "/path/to/repo"
  model: "claude-sonnet-4-5-20250929"
  max_iterations: 5

notifications:
  on_success:
    - type: wechat
      channel: serverchan
      title: "PR Review Complete"
      body: "PR review completed in {{duration}}"

    - type: webhook
      url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
      body: '{"text": "PR review completed in {{duration}}"}'

concurrency:
  max_concurrent: 1
  overlap_policy: skip
